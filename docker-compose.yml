services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartjob
      POSTGRES_PASSWORD: smartjob
      POSTGRES_DB: smartjob
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartjob"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://smartjob:smartjob@db:5432/smartjob
      JWT_SECRET: dev-secret-change-me-please
      WEB_ORIGIN: http://localhost:5173
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./apps/api/tests:/app/apps/api/tests
      - ./packages/shared/src:/app/packages/shared/src
    # `db push` syncs schema → DB without migration files (fine for dev/first-run).
    # Switch to `prisma migrate deploy` once you generate proper migrations.
    command: >
      sh -c "pnpm --filter api prisma db push --accept-data-loss &&
             (pnpm --filter api prisma db seed || true) &&
             pnpm --filter api dev"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./apps/web/vite.config.ts:/app/apps/web/vite.config.ts
      - ./apps/web/tailwind.config.ts:/app/apps/web/tailwind.config.ts
      - ./apps/web/postcss.config.js:/app/apps/web/postcss.config.js
      - ./packages/shared/src:/app/packages/shared/src

volumes:
  db_data:

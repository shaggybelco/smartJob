name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      JWT_SECRET: ci-secret-ci-secret-ci-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Apply database schema
        run: pnpm --filter api exec prisma db push --accept-data-loss

      - name: Typecheck shared
        run: pnpm --filter @smartjob/shared run typecheck

      - name: Typecheck api
        run: pnpm --filter api run typecheck

      - name: Typecheck web
        run: pnpm --filter web run typecheck

      - name: Run tests
        run: pnpm -r --filter "./apps/*" --filter "./packages/*" run test
